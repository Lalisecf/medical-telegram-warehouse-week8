version: 2

models:

  - name: dim_channels
    description: Channel dimension

    columns:
      - name: channel_name
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: Date dimension

    columns:
      - name: message_date
        tests:
          - unique
          - not_null

  - name: fct_messages
    description: Fact table for Telegram messages

    columns:

      - name: message_id
        tests:
          - not_null

      - name: channel_name
        tests:
          - not_null

          - relationships:
              to: ref('dim_channels')
              field: channel_name

      - name: message_date
        tests:
          - not_null

          - relationships:
              to: ref('dim_dates')
              field: message_date