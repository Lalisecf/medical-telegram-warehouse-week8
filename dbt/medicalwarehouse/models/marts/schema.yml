version: 2

models:

  - name: dim_channels
    description: "Dimension table containing unique Telegram channels."

    columns:

      - name: channel_name
        description: "Unique name of the Telegram channel."
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: "Dimension table containing calendar dates extracted from message timestamps."

    columns:

      - name: message_date
        description: "Date on which the Telegram message was posted."
        tests:
          - unique
          - not_null

      - name: year
        description: "Year extracted from the message date."

      - name: month
        description: "Month extracted from the message date."

      - name: day
        description: "Day of the month extracted from the message date."

      - name: day_of_week
        description: "Day of the week extracted from the message date."

  - name: fct_messages
    description: "Fact table containing one record for every Telegram message."

    columns:

      - name: message_id
        description: "Unique Telegram message ID."
        tests:
          - not_null

      - name: channel_name
        description: "Channel where the message was posted."
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_name

      - name: message_date
        description: "Date the message was posted."
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: message_date

      - name: message_text
        description: "Text content of the Telegram message."

      - name: message_length
        description: "Number of characters in the message."

      - name: views
        description: "Total number of views."

      - name: forwards
        description: "Total number of forwards."

      - name: has_media
        description: "Indicates whether the message contains any media."

      - name: has_image
        description: "Indicates whether the message contains an image."

      - name: image_path
        description: "Local path where the downloaded image is stored."